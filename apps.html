<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hossam TV — Setup Guide</title>
<link rel="icon" type="image/png" href="https://hossamurai.github.io/roundlogo.png">
<link rel="apple-touch-icon" href="https://hossamurai.github.io/roundlogo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ============================================================
   THEME TOKENS — change --accent (and its shades) to rebrand
   ============================================================ */
:root{
  --bg:#f5f6f8;
  --card:#ffffff;
  --border:#e6e8ec;
  --border-strong:#d4d7dd;
  --text:#111827;
  --muted:#6b7280;
  --faint:#9ca3af;
  --accent:#0d9488;          /* teal */
  --accent-700:#0f766e;
  --accent-soft:#f0fdfa;
  --accent-soft-2:#cdeeea;
  --warn:#b45309;
  --warn-bg:#fffbeb;
  --warn-border:#fde68a;
  --wa:#25D366;
  --radius:16px;
  --radius-sm:12px;
  --shadow-sm:0 1px 2px rgba(16,24,40,.06);
  --shadow:0 6px 20px -8px rgba(16,24,40,.14);
  --font:'Plus Jakarta Sans','Cairo', system-ui, -apple-system, sans-serif;
}

*{ box-sizing:border-box; }
html,body{ margin:0; padding:0; }
body{ font-family:var(--font); color:var(--text); background:var(--bg); min-height:100vh; -webkit-font-smoothing:antialiased; line-height:1.5; }

.wrap{ max-width:900px; margin:0 auto; padding:32px 22px 0; }

/* ---------- sticky top bar (locked LTR so it never moves on toggle) ---------- */
.topbar{ position:sticky; top:0; z-index:100; direction:ltr;
  background:rgba(245,246,248,0.88); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border); }
.topbar-inner{ max-width:900px; margin:0 auto; padding:12px 22px; display:flex; align-items:center; justify-content:space-between; gap:14px; }
.brand{ display:inline-flex; align-items:center; gap:10px; text-decoration:none; color:var(--text); }
.brand-logo{ width:34px; height:34px; border-radius:22%; display:block; object-fit:cover; box-shadow:0 2px 6px rgba(16,24,40,.18); }
.brand-name{ font-weight:700; font-size:16px; letter-spacing:-.01em; }

.lang-toggle{ display:inline-flex; align-items:center; gap:4px; background:#fff; border:2px solid var(--accent); border-radius:999px; padding:4px; box-shadow:var(--shadow); }
.lang-toggle .globe{ display:grid; place-items:center; width:18px; height:18px; color:var(--accent); margin-inline-start:7px; }
.lang-toggle .globe svg{ width:100%; height:100%; }
.lang-toggle button{ border:0; background:transparent; cursor:pointer; font-family:var(--font); font-weight:700; font-size:14px; padding:8px 15px; border-radius:999px; color:var(--accent); transition:background .15s ease, color .15s ease; }
.lang-toggle button:hover{ background:var(--accent-soft); }
.lang-toggle button.is-active{ background:var(--accent); color:#fff; }
.lang-toggle button:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }

/* ---------- header ---------- */
.intro{ margin:34px 0 8px; }
.intro h1{ font-weight:800; font-size:clamp(28px,4.6vw,40px); line-height:1.12; letter-spacing:-0.025em; margin:0 0 10px; }
.intro p{ color:var(--muted); font-size:clamp(15px,2vw,17px); max-width:56ch; margin:0; }

/* ---------- blocks ---------- */
.block{ margin-top:40px; scroll-margin-top:80px; }
.block[hidden]{ display:none; }
.block-head{ display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:18px; }
.block-label{ display:flex; align-items:center; gap:10px; margin:0 0 18px; font-size:13px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
.block-head .block-label{ margin:0; }
.block-label .num{ width:22px; height:22px; border-radius:6px; display:grid; place-items:center; background:var(--accent-soft); color:var(--accent); font-size:12px; font-weight:700; }

/* ---------- reset ---------- */
.reset{ display:inline-flex; align-items:center; gap:7px; cursor:pointer; background:#fff; border:1.5px solid var(--border-strong); color:var(--text); font-family:var(--font); font-weight:600; font-size:13.5px; padding:8px 16px; border-radius:999px; transition:border-color .18s ease, color .18s ease, background .18s ease; }
.reset[hidden]{ display:none; }
.reset .ric{ display:grid; place-items:center; width:16px; height:16px; }
.reset .ric svg{ width:100%; height:100%; }
.reset:hover{ border-color:var(--accent); color:var(--accent); background:var(--accent-soft); }
.reset:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }

/* ---------- device grid ---------- */
.devices{ display:flex; flex-wrap:wrap; gap:14px; }
.device{ flex:0 1 150px; cursor:pointer; text-align:center; background:var(--card); border:1.5px solid var(--border); border-radius:var(--radius-sm); padding:18px 14px 15px; font-family:var(--font); color:var(--text); box-shadow:var(--shadow-sm); display:flex; flex-direction:column; align-items:center; gap:10px; transition:border-color .18s ease, box-shadow .18s ease, transform .18s ease, background .18s ease; }
.device:hover{ border-color:var(--border-strong); box-shadow:var(--shadow); transform:translateY(-2px); }
.device:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
.device.is-active{ border-color:var(--accent); background:var(--accent-soft); box-shadow:var(--shadow); }
.device-icon{ width:34px; height:34px; color:var(--accent); display:grid; place-items:center; }
.device-icon svg{ width:100%; height:100%; }
.device-name{ font-size:13.5px; font-weight:600; line-height:1.3; }

/* ---------- steps ---------- */
.crumb{ font-size:14px; color:var(--muted); margin:0 0 22px; }
.crumb:empty{ display:none; }
.crumb b{ color:var(--text); font-weight:700; }
.steps{ list-style:none; margin:0 0 6px; padding:0; position:relative; }
.steps:empty{ display:none; }
.steps::before{ content:""; position:absolute; left:15px; top:8px; bottom:24px; width:2px; background:var(--border); }
[dir="rtl"] .steps::before{ left:auto; right:15px; }
.step{ position:relative; display:flex; gap:16px; align-items:flex-start; padding-bottom:22px; }
.step:last-child{ padding-bottom:8px; }
.step-num{ flex:0 0 32px; width:32px; height:32px; border-radius:50%; position:relative; z-index:1; background:var(--card); border:1.5px solid var(--accent); color:var(--accent); display:grid; place-items:center; font-weight:700; font-size:14px; }
.step-body{ padding-top:4px; min-width:0; flex:1; }
.step-text{ margin:0; font-size:15.5px; line-height:1.6; color:var(--text); }
.step-text b{ font-weight:700; }
.step-text .hint{ display:block; margin-top:7px; font-size:13.5px; color:var(--muted); }

.step-text a, .note a{ color:var(--accent); font-weight:600; text-decoration:none; border-bottom:1px solid var(--accent-soft-2); }
.step-text a:hover, .note a:hover{ color:var(--accent-700); border-bottom-color:currentColor; }

/* code chips (copy + link variants) */
.code{ display:inline-block; direction:ltr; unicode-bidi:isolate; font-family:ui-monospace, SFMono-Regular, Menlo, monospace; font-size:13.5px; font-weight:600; background:var(--accent-soft); color:var(--accent) !important; border:1px solid var(--accent-soft-2); border-bottom:1px solid var(--accent-soft-2) !important; padding:3px 10px; border-radius:7px; margin:0 1px; }
.code:hover{ background:var(--accent-soft-2); }
.code-copy{ display:inline-flex; align-items:center; gap:6px; cursor:copy; }
.code-copy svg{ width:13px; height:13px; opacity:.75; }
.code-row{ display:inline-flex; align-items:center; gap:6px; direction:ltr; unicode-bidi:isolate; }
.code-copybtn{ display:inline-grid; place-items:center; width:30px; height:30px; border-radius:8px; border:1px solid var(--accent-soft-2); background:var(--accent-soft); color:var(--accent); cursor:pointer; flex-shrink:0; }
.code-copybtn:hover{ background:var(--accent-soft-2); }
.code-copybtn svg{ width:15px; height:15px; }
.code-copybtn:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }

/* ---------- inline plan picker ---------- */
.planpick{ margin-top:12px; background:var(--bg); border:1px solid var(--border); border-radius:12px; padding:12px; }
.planpick-btns{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px; }
.pp{ border:1.5px solid var(--border-strong); background:#fff; color:var(--text); font-family:var(--font); font-weight:600; font-size:13px; padding:7px 13px; border-radius:999px; cursor:pointer; transition:border-color .15s ease, color .15s ease, background .15s ease; }
.pp:hover{ border-color:var(--accent); color:var(--accent); }
.pp.is-active{ background:var(--accent); border-color:var(--accent); color:#fff; }
.pp:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
.planpick-out{ font-size:14px; min-height:34px; display:flex; align-items:center; }
.pp-prompt{ color:var(--faint); font-size:13.5px; }

/* ---------- notes ---------- */
.notes{ margin-top:18px; }
.note{ border:1px solid var(--border); border-inline-start:3px solid var(--accent); background:var(--card); border-radius:10px; padding:13px 15px; margin-bottom:10px; font-size:14px; line-height:1.55; color:var(--text); }
.note .label{ display:block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--accent); margin-bottom:4px; }
.note.warn{ border-color:var(--warn-border); border-inline-start-color:var(--warn); background:var(--warn-bg); }
.note.warn .label{ color:var(--warn); }
.note.warn a{ color:var(--warn); border-bottom-color:var(--warn-border); }

/* ---------- roku message ---------- */
.roku-wrap[hidden]{ display:none; }
.roku-card{ display:flex; gap:16px; align-items:flex-start; background:var(--accent-soft); border:1px solid var(--accent-soft-2); border-radius:14px; padding:20px; }
.roku-emoji{ font-size:34px; line-height:1; }
.roku-card p{ margin:0; font-size:16px; line-height:1.6; color:var(--text); }

/* ---------- golden rule (always visible) ---------- */
.golden{ margin-top:56px; background:var(--card); border:1px solid var(--border); border-inline-start:4px solid var(--accent); border-radius:16px; padding:24px; box-shadow:var(--shadow-sm); }
.golden h3{ margin:0 0 4px; font-size:18px; font-weight:800; color:var(--text); display:flex; align-items:center; gap:10px; }
.golden .gr-key{ width:21px; height:21px; color:var(--accent); flex-shrink:0; }
.golden .gr-sub{ margin:0 0 16px; color:var(--accent); font-weight:700; font-size:12px; letter-spacing:.08em; text-transform:uppercase; }
.golden ul{ margin:0; padding:0; list-style:none; display:grid; gap:14px; }
.golden li{ font-size:14.5px; line-height:1.55; color:var(--muted); }
.golden li b{ display:block; color:var(--text); font-weight:700; margin-bottom:2px; }
.golden .gr-eg{ margin:16px 0 0; padding-top:14px; border-top:1px solid var(--border); font-size:13.5px; color:var(--muted); }
.golden .gr-eg b{ color:var(--text); }

/* ---------- footer ---------- */
.site-footer{ border-top:1px solid var(--border); background:#fff; margin-top:56px; }
.footer-inner{ max-width:900px; margin:0 auto; padding:26px 22px 8px; display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; }
.footer-brand{ display:inline-flex; align-items:center; gap:9px; text-decoration:none; color:var(--text); font-weight:700; font-size:15px; }
.footer-brand img{ width:28px; height:28px; border-radius:22%; }
.wa-btn{ display:inline-flex; align-items:center; gap:9px; background:var(--wa); color:#053d1c; font-weight:700; text-decoration:none; padding:11px 20px; border-radius:999px; font-size:14.5px; box-shadow:0 8px 20px -8px rgba(37,211,102,.6); }
.wa-btn:hover{ filter:brightness(1.04); }
.wa-btn svg{ width:19px; height:19px; }
.footer-copy{ max-width:900px; margin:0 auto; padding:6px 22px 28px; color:var(--faint); font-size:13px; text-align:center; }

/* ---------- copy toast ---------- */
.toast{ position:fixed; left:50%; bottom:28px; transform:translateX(-50%) translateY(10px); background:var(--text); color:#fff; padding:10px 18px; border-radius:999px; font-size:14px; font-weight:600; opacity:0; pointer-events:none; transition:opacity .2s ease, transform .2s ease; z-index:2000; }
.toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

/* ---------- reveal ---------- */
.reveal{ opacity:0; transform:translateY(8px); transition:opacity .28s ease, transform .28s ease; }
.reveal.show{ opacity:1; transform:none; }

/* ---------- responsive ---------- */
@media (max-width:560px){
  .wrap{ padding:24px 16px 0; }
  .topbar-inner{ padding:10px 16px; }
  .brand-logo{ width:30px; height:30px; }
  .brand-name{ font-size:15px; }
  .lang-toggle button{ padding:8px 12px; font-size:13.5px; }
  .device{ flex:1 1 calc(50% - 7px); }
  .footer-inner{ justify-content:center; }
}
@media (prefers-reduced-motion:reduce){
  *{ transition:none !important; }
  .reveal{ opacity:1; transform:none; }
}
</style>
</head>

/* copy-only chip (for codes typed into Downloader) */
function copyChip(code){
  const label = code.replace(/^https?:\/\//,'');
  return `<button type="button" class="code code-copy" data-copy="${label}" aria-label="Copy ${label}">${label} ${ICONS.copy}</button>`;
}
/* clickable link + copy button (for phone/tablet, opened in a browser) */
function linkChip(code){
  const url = code.startsWith('http') ? code : 'https://' + code;
  const label = code.replace(/^https?:\/\//,'');
  return `<span class="code-row"><a class="code" href="${url}" target="_blank" rel="noopener noreferrer">${label}</a><button type="button" class="code-copybtn" data-copy="${label}" aria-label="Copy ${label}">${ICONS.copy}</button></span>`;
}

const PLAN_DATA = [
  { id:'basic',   name:{en:'Basic Plan',    ar:'الباقة الأساسية'}, code:'tinyurl.com/neo4kapp', firestickAlt:null },
  { id:'premium', name:{en:'Premium Plan',  ar:'الباقة المميزة'},  code:'tinyurl.com/the8kapp', firestickAlt:'tinyurl.com/strngapp' },
  { id:'xtv',     name:{en:'XTV Server',    ar:'سيرفر XTV'},       code:'tinyurl.com/xapppro',  firestickAlt:null },
  { id:'marvel',  name:{en:'Marvel Server', ar:'سيرفر مارفل'},     code:'tinyurl.com/appmrvl',  firestickAlt:null },
];

/* code/link for a given device + plan (Firestick can differ) */
function codeFor(deviceId, planId){
  const plan = PLAN_DATA.find(p=>p.id===planId);
  if(deviceId === 'firestick') return plan.firestickAlt || plan.code;
  return plan.code;
}

/* inline plan-picker scaffold (filled in on click) */
function pickerHTML(deviceId, lang){
  const ar = lang === 'ar';
  const isLink = deviceId === 'android';
  const prompt = ar
    ? (isLink ? 'اختر باقتك لإظهار الرابط' : 'اختر باقتك لإظهار الكود')
    : (isLink ? 'Pick your plan to reveal your link' : 'Pick your plan to reveal your code');
  const btns = PLAN_DATA.map(p=>
    `<button type="button" class="pp" data-device="${deviceId}" data-plan="${p.id}" aria-pressed="false">${p.name[lang]}</button>`
  ).join('');
  return `<div class="planpick"><div class="planpick-btns">${btns}</div><div class="planpick-out"><span class="pp-prompt">${prompt}</span></div></div>`;
}

/* ============================================================
   BEHAVIOUR
   ============================================================ */
const LANG = { current:'en' };
const devicesEl  = document.getElementById('devices');
const stepsBlock = document.getElementById('stepsBlock');
const crumbEl    = document.getElementById('crumb');
const stepsEl    = document.getElementById('steps');
const notesEl    = document.getElementById('notes');
const rokuMsg    = document.getElementById('rokuMsg');
const resetBtn   = document.getElementById('reset');
const langToggle = document.getElementById('langToggle');
const goldenEl   = document.getElementById('golden');
const toastEl    = document.getElementById('toast');

let activeDeviceId = null;
let toastTimer = null;

function reveal(el){
  el.hidden = false; el.classList.remove('show');
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('show')));
}

function applyStaticText(){
  const t = STR[LANG.current];
  document.querySelectorAll('[data-t]').forEach(el=>{ el.textContent = t[el.dataset.t]; });
}

/* ---- always-visible Golden Rule ---- */
function renderDisclaimer(){
  const ar = LANG.current === 'ar';
  if(ar){
    goldenEl.innerHTML = `
      <h3>${ICONS.key} القاعدة الذهبية</h3>
      <p class="gr-sub">مشاهدة على جهاز واحد في نفس الوقت</p>
      <ul>
        <li><b>ثبّت على أي عدد من الأجهزة</b>يمكنك تثبيت الاشتراك على عدد غير محدود من الأجهزة — تلفاز، موبايل، أو تابلت.</li>
        <li><b>التشغيل على جهاز واحد فقط</b>جهاز واحد فقط يمكنه التشغيل في نفس اللحظة. تشغيل أكثر من جهاز في نفس الوقت سيقفل الحساب تلقائيًا.</li>
        <li><b>محتاج شاشتين في نفس الوقت؟</b>هذا يتطلب اشتراكين منفصلين.</li>
      </ul>
      <p class="gr-eg"><b>مثال (أسعار الباقة الأساسية):</b> حساب واحد لمدة سنة: 35 دولار — حسابان (كل منهما سنة): 60 دولار.</p>`;
  } else {
    goldenEl.innerHTML = `
      <h3>${ICONS.key} Golden Rule</h3>
      <p class="gr-sub">One stream at a time</p>
      <ul>
        <li><b>Install anywhere</b>Set it up on as many devices as you like — TV, phone, or tablet.</li>
        <li><b>Play on one at a time</b>Only ONE device can stream at any moment. Playing on two at once will automatically lock your account.</li>
        <li><b>Need two screens at once?</b>That requires two separate subscriptions.</li>
      </ul>
      <p class="gr-eg"><b>Example (Basic plan):</b> one account for a year is $35 — two accounts (a year each) is $60.</p>`;
  }
}

function renderDevices(){
  const devices = buildDevices(LANG.current);
  devicesEl.innerHTML = '';
  devices.forEach(dev=>{
    const btn = document.createElement('button');
    btn.className = 'device'; btn.type = 'button'; btn.dataset.id = dev.id;
    const on = dev.id === activeDeviceId;
    if(on) btn.classList.add('is-active');
    btn.setAttribute('aria-pressed', on ? 'true' : 'false');
    btn.setAttribute('aria-label', dev.name);
    btn.innerHTML = `<span class="device-icon">${dev.icon}</span><span class="device-name">${dev.name}</span>`;
    btn.addEventListener('click', ()=>selectDevice(dev.id));
    devicesEl.appendChild(btn);
  });
}

function selectDevice(deviceId){
  activeDeviceId = deviceId;
  [...devicesEl.children].forEach(c=>{
    const on = c.dataset.id === deviceId;
    c.classList.toggle('is-active', on);
    c.setAttribute('aria-pressed', on ? 'true' : 'false');
  });
  resetBtn.hidden = false;
  renderSteps();
}

function renderSteps(){
  const lang = LANG.current;
  const dev = buildDevices(lang).find(d=>d.id===activeDeviceId);
  if(!dev) return;

  if(dev.roku){
    crumbEl.innerHTML = '';
    stepsEl.innerHTML = '';
    notesEl.innerHTML = '';
    rokuMsg.hidden = false;
    rokuMsg.innerHTML = `<div class="roku-card"><span class="roku-emoji">🙂</span><p>${dev.message}</p></div>`;
    reveal(stepsBlock);
    setTimeout(()=>stepsBlock.scrollIntoView({behavior:'smooth', block:'nearest'}), 80);
    return;
  }

  rokuMsg.hidden = true; rokuMsg.innerHTML = '';
  crumbEl.innerHTML = STR[lang].settingUp(dev.name);
  stepsEl.innerHTML = dev.steps.map((s,i)=>`
    <li class="step">
      <span class="step-num">${i+1}</span>
      <span class="step-body"><div class="step-text">${s.html}</div></span>
    </li>`).join('');
  const notes = dev.notes || [];
  notesEl.innerHTML = notes.map(n=>`
    <div class="note ${n.type==='warn'?'warn':'tip'}">
      <span class="label">${n.label}</span>
      <div>${n.html}</div>
    </div>`).join('');
  reveal(stepsBlock);
  setTimeout(()=>stepsBlock.scrollIntoView({behavior:'smooth', block:'nearest'}), 80);
}

/* inline plan picker — reveal the code (copy-only) or link (clickable) */
stepsEl.addEventListener('click', e=>{
  const btn = e.target.closest('.pp');
  if(!btn) return;
  const wrap = btn.closest('.planpick');
  wrap.querySelectorAll('.pp').forEach(b=>{
    const on = b === btn;
    b.classList.toggle('is-active', on);
    b.setAttribute('aria-pressed', on ? 'true' : 'false');
  });
  const deviceId = btn.dataset.device;
  const code = codeFor(deviceId, btn.dataset.plan);
  wrap.querySelector('.planpick-out').innerHTML = (deviceId === 'android') ? linkChip(code) : copyChip(code);
});

/* copy-to-clipboard for any [data-copy] chip/button */
function showToast(msg){
  toastEl.textContent = msg;
  toastEl.hidden = false;
  requestAnimationFrame(()=>toastEl.classList.add('show'));
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>toastEl.classList.remove('show'), 1400);
}
function copyText(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>showToast(STR[LANG.current].copied)).catch(()=>fallbackCopy(text));
  } else { fallbackCopy(text); }
}
function fallbackCopy(text){
  const ta = document.createElement('textarea');
  ta.value = text; ta.setAttribute('readonly',''); ta.style.position='absolute'; ta.style.left='-9999px';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); showToast(STR[LANG.current].copied); } catch(e){}
  document.body.removeChild(ta);
}
document.addEventListener('click', e=>{
  const b = e.target.closest('[data-copy]');
  if(!b) return;
  e.preventDefault();
  copyText(b.getAttribute('data-copy'));
});

function resetAll(){
  activeDeviceId = null;
  [...devicesEl.children].forEach(c=>{ c.classList.remove('is-active'); c.setAttribute('aria-pressed','false'); });
  stepsBlock.hidden = true; stepsBlock.classList.remove('show');
  rokuMsg.hidden = true;
  resetBtn.hidden = true;
  window.scrollTo({ top:0, behavior:'smooth' });
}

function setLang(lang){
  LANG.current = lang;
  const html = document.documentElement;
  html.lang = lang; html.dir = lang === 'ar' ? 'rtl' : 'ltr';
  [...langToggle.querySelectorAll('button')].forEach(b=>{
    const on = b.dataset.lang === lang;
    b.classList.toggle('is-active', on);
    b.setAttribute('aria-pressed', on ? 'true' : 'false');
  });
  applyStaticText();
  renderDisclaimer();
  renderDevices();
  if(activeDeviceId) renderSteps();
}

langToggle.querySelectorAll('button').forEach(b=> b.addEventListener('click', ()=>setLang(b.dataset.lang)));
resetBtn.addEventListener('click', resetAll);

setLang('en');
</script>
