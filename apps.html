<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hossam TV — Setup Guide</title>
<link rel="icon" type="image/png" href="https://hossamurai.github.io/roundlogo.png">
<link rel="apple-touch-icon" href="https://hossamurai.github.io/roundlogo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f6f8;
  --card:#ffffff;
  --border:#e6e8ec;
  --border-strong:#d4d7dd;
  --text:#111827;
  --muted:#6b7280;
  --faint:#9ca3af;
  /* default teal — overridden when a plan is selected */
  --accent:#0d9488;
  --accent-700:#0f766e;
  --accent-soft:#f0fdfa;
  --accent-soft-2:#cdeeea;
  --warn:#b45309;
  --warn-bg:#fffbeb;
  --warn-border:#fde68a;
  --wa:#25D366;
  --radius:16px;
  --radius-sm:12px;
  --shadow-sm:0 1px 2px rgba(16,24,40,.06);
  --shadow:0 6px 20px -8px rgba(16,24,40,.14);
  --font:'Plus Jakarta Sans','Cairo', system-ui, -apple-system, sans-serif;
}
*{ box-sizing:border-box; }
html,body{ margin:0; padding:0; }
body{ font-family:var(--font); color:var(--text); background:var(--bg); min-height:100vh; -webkit-font-smoothing:antialiased; line-height:1.5; }

.wrap{ max-width:900px; margin:0 auto; padding:32px 22px 0; }

/* ---- sticky topbar (always LTR so logo/toggle never move) ---- */
.topbar{ position:sticky; top:0; z-index:100; direction:ltr; background:rgba(245,246,248,0.9); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border-bottom:1px solid var(--border); }
.topbar-inner{ max-width:900px; margin:0 auto; padding:11px 22px; display:flex; align-items:center; justify-content:space-between; gap:14px; }
.brand{ display:inline-flex; align-items:center; gap:10px; text-decoration:none; color:var(--text); }
.brand-logo{ width:34px; height:34px; border-radius:22%; display:block; object-fit:cover; box-shadow:0 2px 6px rgba(16,24,40,.18); }
.brand-name{ font-weight:700; font-size:16px; letter-spacing:-.01em; }
.lang-toggle{ display:inline-flex; align-items:center; gap:3px; background:#fff; border:2px solid var(--accent); border-radius:999px; padding:4px; box-shadow:var(--shadow); }
.lang-toggle .globe{ display:grid; place-items:center; width:18px; height:18px; color:var(--accent); margin-inline-start:7px; }
.lang-toggle .globe svg{ width:100%; height:100%; }
.lang-toggle button{ border:0; background:transparent; cursor:pointer; font-family:var(--font); font-weight:700; font-size:14px; padding:8px 15px; border-radius:999px; color:var(--accent); transition:background .15s, color .15s; }
.lang-toggle button:hover{ background:var(--accent-soft); }
.lang-toggle button.is-active{ background:var(--accent); color:#fff; }
.lang-toggle button:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }

/* ---- intro ---- */
.intro{ margin:0 0 8px; }
.intro h1{ font-weight:800; font-size:clamp(26px,4.2vw,38px); line-height:1.12; letter-spacing:-0.025em; margin:0 0 8px; }
.intro p{ color:var(--muted); font-size:clamp(14px,1.9vw,16px); max-width:56ch; margin:0; }

/* ---- golden rule ---- */
.golden{ margin:0 0 28px; display:flex; align-items:center; gap:14px; background:linear-gradient(135deg,#fff7df,#fcebbd); border:1px solid #eed487; border-radius:14px; padding:14px 18px; box-shadow:0 8px 22px -12px rgba(184,134,11,.45); }
.golden svg.gr-key{ width:26px; height:26px; color:#b8860b; flex-shrink:0; }
.golden .gr-body{ min-width:0; }
.golden .gr-title{ margin:0; font-size:15px; line-height:1.45; color:#5f4708; }
.golden .gr-title b{ font-weight:800; color:#4d3a06; }
.golden .gr-sub{ margin:3px 0 0; font-size:12.5px; line-height:1.45; color:#8a6d1f; }

/* ---- blocks ---- */
.block{ margin-top:38px; scroll-margin-top:80px; }
.block[hidden]{ display:none; }
.block-head{ display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:18px; }
.block-label{ display:flex; align-items:center; gap:10px; margin:0 0 18px; font-size:12.5px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; }
.block-head .block-label{ margin:0; }
.block-label .num{ width:22px; height:22px; border-radius:6px; display:grid; place-items:center; background:var(--accent-soft); color:var(--accent); font-size:12px; font-weight:700; }

/* ---- reset button ---- */
.reset{ display:inline-flex; align-items:center; gap:7px; cursor:pointer; background:#fff; border:1.5px solid var(--border-strong); color:var(--text); font-family:var(--font); font-weight:600; font-size:13px; padding:7px 15px; border-radius:999px; transition:border-color .18s, color .18s, background .18s; }
.reset[hidden]{ display:none; }
.reset .ric{ display:grid; place-items:center; width:15px; height:15px; }
.reset .ric svg{ width:100%; height:100%; }
.reset:hover{ border-color:var(--accent); color:var(--accent); background:var(--accent-soft); }
.reset:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }

/* ---- plan cards ---- */
.plans-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }
.plan-card{ cursor:pointer; text-align:center; background:var(--card); border:1.5px solid var(--border); border-radius:var(--radius); padding:22px 12px 16px; font-family:var(--font); color:var(--text); box-shadow:var(--shadow-sm); display:flex; flex-direction:column; align-items:center; gap:11px; transition:border-color .2s, box-shadow .2s, transform .2s, background .2s; position:relative; }
.plan-card:hover{ border-color:var(--p-accent); box-shadow:var(--shadow); transform:translateY(-2px); }
.plan-card:focus-visible{ outline:2px solid var(--p-accent); outline-offset:2px; }
.plan-card.is-active{ border-color:var(--p-accent); background:var(--p-soft); box-shadow:0 0 0 3px var(--p-soft), var(--shadow); }
.plan-card-img{ width:72px; height:72px; object-fit:contain; display:block; border-radius:22%; filter:drop-shadow(0 3px 10px rgba(0,0,0,.22)); transition:transform .2s; }
.plan-card:hover .plan-card-img{ transform:scale(1.04); }
.plan-card-name{ font-weight:700; font-size:14px; letter-spacing:-.01em; line-height:1.2; }
.plan-check{ position:absolute; top:10px; inset-inline-end:10px; width:22px; height:22px; border-radius:50%; background:var(--p-accent); color:#fff; display:none; place-items:center; }
.plan-card.is-active .plan-check{ display:grid; }
.plan-check svg{ width:12px; height:12px; }

/* ---- device grid ---- */
.devices{ display:flex; flex-wrap:wrap; gap:14px; }
.device{ flex:0 1 148px; cursor:pointer; text-align:center; background:var(--card); border:1.5px solid var(--border); border-radius:var(--radius-sm); padding:18px 14px 14px; font-family:var(--font); color:var(--text); box-shadow:var(--shadow-sm); display:flex; flex-direction:column; align-items:center; gap:10px; transition:border-color .18s, box-shadow .18s, transform .18s, background .18s; }
.device:hover{ border-color:var(--border-strong); box-shadow:var(--shadow); transform:translateY(-2px); }
.device:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
.device.is-active{ border-color:var(--accent); background:var(--accent-soft); box-shadow:var(--shadow); }
.device-icon{ width:32px; height:32px; color:var(--accent); display:grid; place-items:center; }
.device-icon svg{ width:100%; height:100%; }
.device-name{ font-size:13px; font-weight:600; line-height:1.3; }

/* ---- steps ---- */
.crumb{ font-size:14px; color:var(--muted); margin:0 0 22px; }
.crumb:empty{ display:none; }
.crumb b{ color:var(--text); font-weight:700; }
.steps{ list-style:none; margin:0 0 6px; padding:0; position:relative; }
.steps:empty{ display:none; }
.steps::before{ content:""; position:absolute; left:15px; top:8px; bottom:24px; width:2px; background:var(--border); }
[dir="rtl"] .steps::before{ left:auto; right:15px; }
.step{ position:relative; display:flex; gap:16px; align-items:flex-start; padding-bottom:22px; }
.step:last-child{ padding-bottom:8px; }
.step-num{ flex:0 0 32px; width:32px; height:32px; border-radius:50%; position:relative; z-index:1; background:var(--card); border:1.5px solid var(--accent); color:var(--accent); display:grid; place-items:center; font-weight:700; font-size:14px; }
.step-body{ padding-top:4px; min-width:0; flex:1; }
.step-text{ margin:0; font-size:15px; line-height:1.65; color:var(--text); }
.step-text b{ font-weight:700; }
.step-text .hint{ display:block; margin-top:7px; font-size:13px; color:var(--muted); }
.step-text a, .note a{ color:var(--accent); font-weight:600; text-decoration:none; border-bottom:1px solid var(--accent-soft-2); }
.step-text a:hover, .note a:hover{ color:var(--accent-700); border-bottom-color:currentColor; }

/* ---- code chips ---- */
.code{ display:inline-block; direction:ltr; unicode-bidi:isolate; font-family:ui-monospace, SFMono-Regular, Menlo, monospace; font-size:13px; font-weight:600; background:var(--accent-soft); color:var(--accent) !important; border:1px solid var(--accent-soft-2); border-bottom:1px solid var(--accent-soft-2) !important; padding:3px 10px; border-radius:7px; margin:0 1px; }
.code:hover{ background:var(--accent-soft-2); }
.code-copy{ display:inline-flex; align-items:center; gap:5px; cursor:copy; }
.code-copy svg{ width:13px; height:13px; opacity:.7; }
.code-row{ display:inline-flex; align-items:center; gap:6px; direction:ltr; unicode-bidi:isolate; }
.code-copybtn{ display:inline-grid; place-items:center; width:30px; height:30px; border-radius:8px; border:1px solid var(--accent-soft-2); background:var(--accent-soft); color:var(--accent); cursor:pointer; flex-shrink:0; }
.code-copybtn:hover{ background:var(--accent-soft-2); }
.code-copybtn svg{ width:15px; height:15px; }
.code-copybtn:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }

/* ---- app list (Android steps) ---- */
.app-list{ display:flex; flex-direction:column; gap:10px; margin-top:14px; }
.app-row{ background:var(--bg); border:1.5px solid var(--border); border-radius:12px; padding:13px 15px; }
.app-row.is-rec{ border-color:var(--accent); background:var(--card); }
.app-row-head{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:8px; }
.app-name{ font-weight:700; font-size:14.5px; color:var(--text); }
.app-rec{ font-size:10.5px; font-weight:700; color:var(--accent); background:var(--accent-soft); border:1px solid var(--accent-soft-2); padding:2px 8px; border-radius:999px; text-transform:uppercase; letter-spacing:.05em; white-space:nowrap; }
.app-code-wrap{ margin-bottom:4px; }
.app-warns{ display:flex; flex-direction:column; gap:3px; margin-top:7px; }
.app-warn{ font-size:12.5px; color:var(--warn); font-weight:500; }

/* ---- notes ---- */
.notes{ margin-top:18px; }
.note{ border:1px solid var(--border); border-inline-start:3px solid var(--accent); background:var(--card); border-radius:10px; padding:13px 15px; margin-bottom:10px; font-size:14px; line-height:1.55; color:var(--text); }
.note .label{ display:block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--accent); margin-bottom:4px; }
.note.warn{ border-color:var(--warn-border); border-inline-start-color:var(--warn); background:var(--warn-bg); }
.note.warn .label{ color:var(--warn); }
.note.warn a{ color:var(--warn); border-bottom-color:var(--warn-border); }

/* ---- roku ---- */
.roku-wrap[hidden]{ display:none; }
.roku-card{ display:flex; gap:16px; align-items:flex-start; background:var(--accent-soft); border:1px solid var(--accent-soft-2); border-radius:14px; padding:20px; }
.roku-emoji{ font-size:34px; line-height:1; }
.roku-card p{ margin:0; font-size:16px; line-height:1.6; color:var(--text); }

/* ---- footer ---- */
.site-footer{ border-top:1px solid var(--border); background:#fff; margin-top:56px; }
.footer-inner{ max-width:900px; margin:0 auto; padding:24px 22px 8px; display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; }
.footer-brand{ display:inline-flex; align-items:center; gap:9px; text-decoration:none; color:var(--text); font-weight:700; font-size:15px; }
.footer-brand img{ width:28px; height:28px; border-radius:22%; }
.wa-btn{ display:inline-flex; align-items:center; gap:9px; background:var(--wa); color:#053d1c; font-weight:700; text-decoration:none; padding:11px 20px; border-radius:999px; font-size:14.5px; box-shadow:0 8px 20px -8px rgba(37,211,102,.6); }
.wa-btn:hover{ filter:brightness(1.04); }
.wa-btn svg{ width:19px; height:19px; }
.footer-copy{ max-width:900px; margin:0 auto; padding:6px 22px 28px; color:var(--faint); font-size:13px; text-align:center; }

/* ---- toast ---- */
.toast{ position:fixed; left:50%; bottom:28px; transform:translateX(-50%) translateY(10px); background:var(--text); color:#fff; padding:10px 18px; border-radius:999px; font-size:14px; font-weight:600; opacity:0; pointer-events:none; transition:opacity .2s, transform .2s; z-index:2000; white-space:nowrap; }
.toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

/* ---- reveal ---- */
.reveal{ opacity:0; transform:translateY(8px); transition:opacity .28s ease, transform .28s ease; }
.reveal.show{ opacity:1; transform:none; }

/* ---- responsive ---- */
@media(max-width:700px){
  .plans-grid{ grid-template-columns:repeat(2,1fr); }
}
@media(max-width:560px){
  .wrap{ padding:24px 16px 0; }
  .topbar-inner{ padding:10px 16px; }
  .brand-logo{ width:30px; height:30px; }
  .brand-name{ font-size:15px; }
  .lang-toggle button{ padding:7px 12px; font-size:13px; }
  .device{ flex:1 1 calc(50% - 7px); }
  .footer-inner{ justify-content:center; }
}
@media(prefers-reduced-motion:reduce){
  *{ transition:none !important; }
  .reveal{ opacity:1; transform:none; }
}
</style>

/* copy-only chip — used for TV/Firestick (type into Downloader) */
function copyChip(code){
  return `<button type="button" class="code code-copy" data-copy="${code}" aria-label="Copy ${code}">${code} ${ICONS.copy}</button>`;
}
/* link + copy chip — used for Android mobile (tap to open in browser) */
function linkChip(code){
  const url = 'https://' + code;
  return `<span class="code-row"><a class="code" href="${url}" target="_blank" rel="noopener noreferrer">${code}</a><button type="button" class="code-copybtn" data-copy="${code}" aria-label="Copy ${code}">${ICONS.copy}</button></span>`;
}

/* renders all apps for the plan as transparent rows with their notes */
function appRowsHTML(plan, deviceId, lang){
  const ar = lang === 'ar';
  const recLabel = ar ? '⭐ موصى به' : '⭐ Recommended';
  return `<div class="app-list">${plan.apps.map(app=>{
    const codeEl = deviceId === 'android' ? linkChip(app.code) : copyChip(app.code);
    const warns = ar ? app.warnAr : app.warnEn;
    const recBadge = app.rec ? `<span class="app-rec">${recLabel}</span>` : '';
    const warnsHtml = warns.length
      ? `<div class="app-warns">${warns.map(w=>`<div class="app-warn">${w}</div>`).join('')}</div>`
      : '';
    return `<div class="app-row${app.rec ? ' is-rec' : ''}">
      <div class="app-row-head"><span class="app-name">${app.name}</span>${recBadge}</div>
      <div class="app-code-wrap">${codeEl}</div>
      ${warnsHtml}
    </div>`;
  }).join('')}</div>`;
}

   ============================================================ */
const LANG = { current:'en' };
const plansGridEl = document.getElementById('plansGrid');
const deviceBlock = document.getElementById('deviceBlock');
const devicesEl   = document.getElementById('devices');
const stepsBlock  = document.getElementById('stepsBlock');
const crumbEl     = document.getElementById('crumb');
const stepsEl     = document.getElementById('steps');
const notesEl     = document.getElementById('notes');
const rokuMsg     = document.getElementById('rokuMsg');
const resetBtn    = document.getElementById('reset');
const langToggle  = document.getElementById('langToggle');
const goldenEl    = document.getElementById('golden');
const toastEl     = document.getElementById('toast');

let activePlan    = null;
let activeDevId   = null;
let toastTimer    = null;

function reveal(el){
  el.hidden = false; el.classList.remove('show');
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('show')));
}
function applyStaticText(){
  const t = STR[LANG.current];
  document.querySelectorAll('[data-t]').forEach(el=>{ el.textContent = t[el.dataset.t]; });
}

/* golden rule */
function renderDisclaimer(){
  const ar = LANG.current === 'ar';
  const keyIcon = `<svg class="gr-key" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="7.5" cy="15.5" r="4"/><path d="M10.3 12.7 20 3M17 6l2.5 2.5M14.5 8.5 17 11"/></svg>`;
  goldenEl.innerHTML = ar
    ? `${keyIcon}<div class="gr-body"><p class="gr-title"><b>القاعدة الذهبية:</b> يمكنك المشاهدة على جهاز واحد فقط في نفس الوقت.</p><p class="gr-sub">ثبّت الاشتراك على أي عدد من الأجهزة، لكن لا يمكن التشغيل إلا على جهاز واحد في آنٍ واحد.</p></div>`
    : `${keyIcon}<div class="gr-body"><p class="gr-title"><b>Golden Rule:</b> you can stream on only one device at a time.</p><p class="gr-sub">Install on as many devices as you like — only one can play at once.</p></div>`;
}

/* plan cards */
function renderPlans(){
  plansGridEl.innerHTML = '';
  PLAN_DATA.forEach(plan=>{
    const btn = document.createElement('button');
    btn.className = 'plan-card'; btn.type = 'button'; btn.dataset.id = plan.id;
    /* per-card accent via CSS custom properties */
    btn.style.setProperty('--p-accent', plan.accent);
    btn.style.setProperty('--p-soft', plan.accentSoft);
    const on = activePlan && activePlan.id === plan.id;
    if(on) btn.classList.add('is-active');
    btn.setAttribute('aria-pressed', on ? 'true' : 'false');
    btn.setAttribute('aria-label', plan.name[LANG.current]);
    btn.innerHTML = `
      <span class="plan-check">${ICONS.check}</span>
      <img class="plan-card-img" src="${plan.img}" alt="${plan.name.en}" width="72" height="72" loading="lazy" decoding="async">
      <span class="plan-card-name">${plan.name[LANG.current]}</span>`;
    btn.addEventListener('click', ()=>selectPlan(plan));
    plansGridEl.appendChild(btn);
  });
}

function selectPlan(plan){
  activePlan = plan;
  activeDevId = null;

  /* push this plan's accent globally so devices + steps inherit it */
  const root = document.documentElement.style;
  root.setProperty('--accent', plan.accent);
  root.setProperty('--accent-soft', plan.accentSoft);
  root.setProperty('--accent-soft-2', plan.accentSoft2);
  root.setProperty('--accent-700', plan.accent700);

  /* update plan card states */
  [...plansGridEl.children].forEach(c=>{
    const on = c.dataset.id === plan.id;
    c.classList.toggle('is-active', on);
    c.setAttribute('aria-pressed', on ? 'true' : 'false');
  });

  /* hide steps */
  stepsBlock.hidden = true; stepsBlock.classList.remove('show');
  resetBtn.hidden = true;

  /* show devices */
  renderDevices();
  if(deviceBlock.hidden) reveal(deviceBlock);
  else deviceBlock.classList.add('show'); /* already revealed, just keep it */
  setTimeout(()=>deviceBlock.scrollIntoView({behavior:'smooth', block:'nearest'}), 160);
}

function renderDevices(){
  if(!activePlan) return;
  const flows = buildFlows(LANG.current, activePlan);
  devicesEl.innerHTML = '';
  flows.forEach(dev=>{
    const btn = document.createElement('button');
    btn.className = 'device'; btn.type = 'button'; btn.dataset.id = dev.id;
    const on = dev.id === activeDevId;
    if(on) btn.classList.add('is-active');
    btn.setAttribute('aria-pressed', on ? 'true' : 'false');
    btn.setAttribute('aria-label', dev.name);
    btn.innerHTML = `<span class="device-icon">${dev.icon}</span><span class="device-name">${dev.name}</span>`;
    btn.addEventListener('click', ()=>selectDevice(dev.id));
    devicesEl.appendChild(btn);
  });
}

function selectDevice(devId){
  activeDevId = devId;
  [...devicesEl.children].forEach(c=>{
    const on = c.dataset.id === devId;
    c.classList.toggle('is-active', on);
    c.setAttribute('aria-pressed', on ? 'true' : 'false');
  });
  resetBtn.hidden = false;
  renderSteps();
}

function renderSteps(){
  if(!activePlan || !activeDevId) return;
  const lang = LANG.current;
  const dev = buildFlows(lang, activePlan).find(d=>d.id===activeDevId);
  if(!dev) return;

  if(dev.roku){
    crumbEl.innerHTML=''; stepsEl.innerHTML=''; notesEl.innerHTML='';
    rokuMsg.hidden = false;
    rokuMsg.innerHTML = `<div class="roku-card"><span class="roku-emoji">🙂</span><p>${dev.message}</p></div>`;
    reveal(stepsBlock);
    setTimeout(()=>stepsBlock.scrollIntoView({behavior:'smooth', block:'nearest'}), 80);
    return;
  }
  rokuMsg.hidden = true; rokuMsg.innerHTML = '';
  crumbEl.innerHTML = STR[lang].settingUp(dev.name);
  stepsEl.innerHTML = dev.steps.map((s,i)=>`
    <li class="step">
      <span class="step-num">${i+1}</span>
      <span class="step-body"><div class="step-text">${s.html}</div></span>
    </li>`).join('');
  notesEl.innerHTML = (dev.notes||[]).map(n=>`
    <div class="note ${n.type==='warn'?'warn':'tip'}">
      <span class="label">${n.label}</span>
      <div>${n.html}</div>
    </div>`).join('');
  reveal(stepsBlock);
  setTimeout(()=>stepsBlock.scrollIntoView({behavior:'smooth', block:'nearest'}), 80);
}

/* copy handling */
function showToast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>toastEl.classList.remove('show'), 1400);
}
function copyText(text){
  (navigator.clipboard ? navigator.clipboard.writeText(text) : Promise.reject())
    .then(()=>showToast(STR[LANG.current].copied))
    .catch(()=>{
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position='absolute'; ta.style.left='-9999px';
      document.body.appendChild(ta); ta.select();
      try{ document.execCommand('copy'); showToast(STR[LANG.current].copied); }catch(e){}
      document.body.removeChild(ta);
    });
}
document.addEventListener('click', e=>{
  const b = e.target.closest('[data-copy]');
  if(!b) return;
  e.preventDefault();
  copyText(b.getAttribute('data-copy'));
});

/* reset — clears device + steps, keeps plan */
function resetAll(){
  activeDevId = null;
  [...devicesEl.children].forEach(c=>{ c.classList.remove('is-active'); c.setAttribute('aria-pressed','false'); });
  stepsBlock.hidden = true; stepsBlock.classList.remove('show');
  resetBtn.hidden = true;
  deviceBlock.scrollIntoView({behavior:'smooth', block:'nearest'});
}

/* language toggle */
function setLang(lang){
  LANG.current = lang;
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  [...langToggle.querySelectorAll('button')].forEach(b=>{
    const on = b.dataset.lang === lang;
    b.classList.toggle('is-active', on);
    b.setAttribute('aria-pressed', on ? 'true' : 'false');
  });
  applyStaticText();
  renderDisclaimer();
  renderPlans();
  if(activePlan){ renderDevices(); }
  if(activePlan && activeDevId){ renderSteps(); }
}

langToggle.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.lang)));
resetBtn.addEventListener('click', resetAll);

setLang('en');
</script>
</body>
</html>
